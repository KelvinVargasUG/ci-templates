name: Microservice pipeline - Factura

on:
  workflow_call:
    inputs:
      java_version:
        type: string
        default: "21"
      promote_branch:
        type: string
        default: "release"

permissions:
  contents: write

jobs:
  validate_pull_request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Read Gradle version
        id: gradle
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q printVersion | tr -d '\r' | tail -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Gradle version: $VERSION"

      - name: Compute expected next tag (patch +1)
        id: expected
        run: |
          set -euo pipefail

          # Trae el último tag tipo 1.2.3-RELEASE (ajusta el patrón si cambia)
          LAST_TAG=$(git tag -l '*.*.*-RELEASE' --sort=-v:refname | head -n 1 || true)

          if [ -z "$LAST_TAG" ]; then
            echo "No existen tags previos con patrón *.*.*-RELEASE; asumiré 0.0.1-RELEASE como esperado."
            echo "last_tag=" >> "$GITHUB_OUTPUT"
            echo "expected_tag=0.0.1-RELEASE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${LAST_TAG%-RELEASE}"   # "1.2.3"
          IFS='.' read -r major minor patch <<< "$base"

          if [ -z "${major:-}" ] || [ -z "${minor:-}" ] || [ -z "${patch:-}" ]; then
            echo "❌ No pude parsear el tag '$LAST_TAG' (esperaba X.Y.Z-RELEASE)"
            exit 1
          fi

          next_patch=$((patch + 1))
          EXPECTED="${major}.${minor}.${next_patch}-RELEASE"

          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "expected_tag=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"
          echo "Expected next tag: $EXPECTED"

      - name: Validate Gradle version matches expected next tag
        run: |
          set -euo pipefail
          CURRENT="${{ steps.gradle.outputs.version }}"
          EXPECTED="${{ steps.expected.outputs.expected_tag }}"
          LAST="${{ steps.expected.outputs.last_tag }}"

          echo "Versión actual (Gradle): $CURRENT"
          echo "Último tag encontrado: ${LAST:-<ninguno>}"
          echo "Tag calculado esperado: $EXPECTED"

          if [ "$CURRENT" != "$EXPECTED" ]; then
            echo "❌ Versión no incrementada correctamente."
            echo "   - Versión actual: $CURRENT"
            echo "   - Tag calculado : $EXPECTED"
            echo "Actualiza version en Gradle para que coincida con el tag calculado."
            exit 1
          fi

          echo "✅ OK: versión coincide con el tag calculado."

      - name: Validate only one commit in PR
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          git fetch --no-tags --prune --depth=200 origin

          COMMITS=$(git rev-list --count "$BASE_SHA..$HEAD_SHA")
          echo "Commits in PR: $COMMITS"

          if [ "$COMMITS" -ne 1 ]; then
            echo "❌ El PR debe tener exactamente 1 commit. Tiene $COMMITS."
            exit 1
          fi

          echo "✅ PR tiene exactamente 1 commit."

  build_test_coverage:
    runs-on: ubuntu-latest
    needs: validate_pull_request
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Build jar + run tests + JaCoCo verification
        run: |
          set -euo pipefail
          ./gradlew clean test bootJar jacocoTestReport jacocoTestCoverageVerification

      - name: Verify jar exists
        run: |
          set -euo pipefail
          ls -lah build/libs || true
          JAR=$(ls -1 build/libs/*.jar 2>/dev/null | head -n 1 || true)
          if [ -z "$JAR" ]; then
            echo "❌ No se generó ningún .jar en build/libs/"
            exit 1
          fi
          echo "✅ JAR generado: $JAR"

      - name: Print test summary (passed/failed/skipped)
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, xml.etree.ElementTree as ET

          files = glob.glob("**/build/test-results/test/*.xml", recursive=True)
          if not files:
              raise SystemExit("❌ No encontré XMLs de JUnit en **/build/test-results/test/*.xml")

          tests = failures = errors = skipped = 0
          for f in files:
              root = ET.parse(f).getroot()
              # Puede ser <testsuite> o <testsuites>
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for s in suites:
                  tests += int(s.attrib.get("tests", 0))
                  failures += int(s.attrib.get("failures", 0))
                  errors += int(s.attrib.get("errors", 0))
                  skipped += int(s.attrib.get("skipped", 0))

          passed = tests - failures - errors - skipped
          print(f"✅ Tests total: {tests}")
          print(f"✅ Passed    : {passed}")
          print(f"❌ Failures  : {failures}")
          print(f"❌ Errors    : {errors}")
          print(f"⏭️  Skipped   : {skipped}")

          if failures or errors:
              raise SystemExit("❌ Hay pruebas fallidas/errores. Revisa el log de Gradle.")
          PY

      - name: Print JaCoCo line coverage %
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, xml.etree.ElementTree as ET

          paths = glob.glob("**/build/reports/jacoco/test/jacocoTestReport.xml", recursive=True)
          if not paths:
              raise SystemExit("❌ No encontré jacocoTestReport.xml. Asegúrate de tener xml.required=true")

          p = paths[0]
          root = ET.parse(p).getroot()

          # Buscamos el counter LINE a nivel report
          line = None
          for c in root.findall("counter"):
              if c.attrib.get("type") == "LINE":
                  line = c
                  break

          if line is None:
              raise SystemExit("❌ No encontré counter LINE en el reporte JaCoCo")

          missed = int(line.attrib["missed"])
          covered = int(line.attrib["covered"])
          total = missed + covered
          pct = (covered / total * 100.0) if total else 0.0

          print(f"📈 JaCoCo LINE coverage: {pct:.2f}% (covered={covered}, missed={missed})")

          # No hace falta fallar aquí porque ya lo hace jacocoTestCoverageVerification,
          # pero por seguridad puedes dejarlo:
          if pct < 90.0:
              raise SystemExit("❌ Cobertura < 90%")
          PY

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Upload reports (tests + jacoco)
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/tests/test/**
            **/build/reports/jacoco/test/**
  
  docker_build:
    runs-on: ubuntu-latest
    needs: build_test_coverage
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Verify downloaded jar
        run: |
          set -euo pipefail
          ls -lah build/libs
          test -n "$(ls -1 build/libs/*.jar 2>/dev/null | head -n 1)" || (echo "❌ No llegó el jar" && exit 1)

      - name: Read Gradle version
        id: ver
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q printVersion | tr -d '\r' | tail -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Gradle version: $VERSION"

      - name: Build Docker image
        run: |
          set -euo pipefail
          IMAGE_NAME=ms-factura
          VERSION="${{ steps.ver.outputs.version }}"
          docker build -t $IMAGE_NAME:$VERSION .
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest

      # 0) Instalar Trivy (solo una vez)
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          version: v0.69.2

      # 1) Scan en JSON (no falla aquí) - usando CLI
      - name: Trivy scan (JSON)
        id: trivy_json
        run: |
          set -euo pipefail
          IMAGE="ms-factura:${{ steps.ver.outputs.version }}"

          # Limpieza por si acaso
          rm -f trivy.json

          trivy image \
            --config .trivy.yaml \
            --scanners vuln \
            --vuln-type os,library \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            "$IMAGE"

          echo "✅ trivy.json generado:"
          ls -lah trivy.json

      # 2) Detectar si hay HIGH/CRITICAL
      - name: Check if HIGH/CRITICAL vulnerabilities exist
        id: trivy_check
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os

          path = "trivy.json"
          if not os.path.exists(path):
              raise SystemExit("❌ No existe trivy.json (el scan no lo generó).")

          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          sevs = {"CRITICAL": 0, "HIGH": 0}

          for r in data.get("Results", []):
              for v in (r.get("Vulnerabilities") or []):
                  s = v.get("Severity")
                  if s in sevs:
                      sevs[s] += 1

          has_vulns = (sevs["CRITICAL"] + sevs["HIGH"]) > 0

          print("HIGH:", sevs["HIGH"])
          print("CRITICAL:", sevs["CRITICAL"])
          print("has_vulns:", has_vulns)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"high={sevs['HIGH']}\n")
              out.write(f"critical={sevs['CRITICAL']}\n")
              out.write(f"has_vulns={'true' if has_vulns else 'false'}\n")
          PY

      # 3) Solo si hay vulns, generar HTML bonito
      - name: Trivy scan (HTML report)
        if: steps.trivy_check.outputs.has_vulns == 'true'
        run: |
          set -euo pipefail
          IMAGE="ms-factura:${{ steps.ver.outputs.version }}"
          trivy image \
            --config .trivy.yaml \
            --scanners vuln \
            --vuln-type os,library \
            --ignore-unfixed \
            --format template \
            --template "@contrib/html.tpl" \
            --output trivy-report.html \
            "$IMAGE"
          ls -lah trivy-report.html

      # 4) Subir artifact solo si hay vulns
      - name: Upload Trivy HTML report
        if: steps.trivy_check.outputs.has_vulns == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.html

      # 5) Comentar en PR solo si hay vulns
      - name: Comment PR with Trivy report link
        if: github.event_name == 'pull_request' && steps.trivy_check.outputs.has_vulns == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const pr = context.payload.pull_request?.number;
            if (!pr) return;

            const url = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const version = `${{ steps.ver.outputs.version }}`;
            const high = `${{ steps.trivy_check.outputs.high }}`;
            const critical = `${{ steps.trivy_check.outputs.critical }}`;

            const body = [
              "## 🔐 Trivy detectó vulnerabilidades (HIGH/CRITICAL)",
              "",
              `📦 Imagen: \`ms-factura:${version}\``,
              `- CRITICAL: **${critical}**`,
              `- HIGH: **${high}**`,
              "",
              `➡️ Descarga el artifact **trivy-report** desde este run: ${url}`,
              "",
              "> Run → Artifacts → trivy-report → abrir `trivy-report.html`."
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body
            });

      # 6) Fallar el job si hay HIGH/CRITICAL (para bloquear merge)
      - name: Fail if HIGH/CRITICAL found
        if: steps.trivy_check.outputs.has_vulns == 'true'
        run: |
          echo "❌ Se encontraron vulnerabilidades HIGH/CRITICAL. Revisa el artifact trivy-report."
          exit 1