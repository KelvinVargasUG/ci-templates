name: Microservice pipeline - Factura

on:
  workflow_call:
    inputs:
      java_version:
        type: string
        default: "21"
      promote_branch:
        type: string
        default: "release"
permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Read Gradle version
        id: gradle
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q printVersion | tr -d '\r' | tail -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Gradle version: $VERSION"

      - name: Compute expected next tag (patch +1)
        id: expected
        run: |
          set -euo pipefail

          # Trae el último tag tipo 1.2.3-RELEASE (ajusta el patrón si cambia)
          LAST_TAG=$(git tag -l '*.*.*-RELEASE' --sort=-v:refname | head -n 1 || true)

          if [ -z "$LAST_TAG" ]; then
            echo "No existen tags previos con patrón *.*.*-RELEASE; asumiré 0.0.1-RELEASE como esperado."
            echo "last_tag=" >> "$GITHUB_OUTPUT"
            echo "expected_tag=0.0.1-RELEASE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${LAST_TAG%-RELEASE}"   # "1.2.3"
          IFS='.' read -r major minor patch <<< "$base"

          if [ -z "${major:-}" ] || [ -z "${minor:-}" ] || [ -z "${patch:-}" ]; then
            echo "❌ No pude parsear el tag '$LAST_TAG' (esperaba X.Y.Z-RELEASE)"
            exit 1
          fi

          next_patch=$((patch + 1))
          EXPECTED="${major}.${minor}.${next_patch}-RELEASE"

          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "expected_tag=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"
          echo "Expected next tag: $EXPECTED"

      - name: Validate Gradle version matches expected next tag
        run: |
          set -euo pipefail
          CURRENT="${{ steps.gradle.outputs.version }}"
          EXPECTED="${{ steps.expected.outputs.expected_tag }}"
          LAST="${{ steps.expected.outputs.last_tag }}"

          echo "Versión actual (Gradle): $CURRENT"
          echo "Último tag encontrado: ${LAST:-<ninguno>}"
          echo "Tag calculado esperado: $EXPECTED"

          if [ "$CURRENT" != "$EXPECTED" ]; then
            echo "❌ Versión no incrementada correctamente."
            echo "   - Versión actual: $CURRENT"
            echo "   - Tag calculado : $EXPECTED"
            echo "Actualiza version en Gradle para que coincida con el tag calculado."
            exit 1
          fi

          echo "✅ OK: versión coincide con el tag calculado."

      - name: Validate only one commit in PR
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          git fetch --no-tags --prune --depth=200 origin

          COMMITS=$(git rev-list --count "$BASE_SHA..$HEAD_SHA")
          echo "Commits in PR: $COMMITS"

          if [ "$COMMITS" -ne 1 ]; then
            echo "❌ El PR debe tener exactamente 1 commit. Tiene $COMMITS."
            exit 1
          fi

          echo "✅ PR tiene exactamente 1 commit."