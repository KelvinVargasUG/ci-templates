  build_test_coverage:
    runs-on: ubuntu-latest
    needs: Validate_PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Build jar + run tests + JaCoCo verification
        run: |
          set -euo pipefail
          ./gradlew clean test bootJar jacocoTestReport jacocoTestCoverageVerification

      - name: Verify jar exists
        run: |
          set -euo pipefail
          ls -lah build/libs || true
          JAR=$(ls -1 build/libs/*.jar 2>/dev/null | head -n 1 || true)
          if [ -z "$JAR" ]; then
            echo "❌ No se generó ningún .jar en build/libs/"
            exit 1
          fi
          echo "✅ JAR generado: $JAR"

      - name: Print test summary (passed/failed/skipped)
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, xml.etree.ElementTree as ET

          files = glob.glob("**/build/test-results/test/*.xml", recursive=True)
          if not files:
              raise SystemExit("❌ No encontré XMLs de JUnit en **/build/test-results/test/*.xml")

          tests = failures = errors = skipped = 0
          for f in files:
              root = ET.parse(f).getroot()
              # Puede ser <testsuite> o <testsuites>
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for s in suites:
                  tests += int(s.attrib.get("tests", 0))
                  failures += int(s.attrib.get("failures", 0))
                  errors += int(s.attrib.get("errors", 0))
                  skipped += int(s.attrib.get("skipped", 0))

          passed = tests - failures - errors - skipped
          print(f"✅ Tests total: {tests}")
          print(f"✅ Passed    : {passed}")
          print(f"❌ Failures  : {failures}")
          print(f"❌ Errors    : {errors}")
          print(f"⏭️  Skipped   : {skipped}")

          if failures or errors:
              raise SystemExit("❌ Hay pruebas fallidas/errores. Revisa el log de Gradle.")
          PY

      - name: Print JaCoCo line coverage %
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, xml.etree.ElementTree as ET

          paths = glob.glob("**/build/reports/jacoco/test/jacocoTestReport.xml", recursive=True)
          if not paths:
              raise SystemExit("❌ No encontré jacocoTestReport.xml. Asegúrate de tener xml.required=true")

          p = paths[0]
          root = ET.parse(p).getroot()

          # Buscamos el counter LINE a nivel report
          line = None
          for c in root.findall("counter"):
              if c.attrib.get("type") == "LINE":
                  line = c
                  break

          if line is None:
              raise SystemExit("❌ No encontré counter LINE en el reporte JaCoCo")

          missed = int(line.attrib["missed"])
          covered = int(line.attrib["covered"])
          total = missed + covered
          pct = (covered / total * 100.0) if total else 0.0

          print(f"📈 JaCoCo LINE coverage: {pct:.2f}% (covered={covered}, missed={missed})")

          # No hace falta fallar aquí porque ya lo hace jacocoTestCoverageVerification,
          # pero por seguridad puedes dejarlo:
          if pct < 90.0:
              raise SystemExit("❌ Cobertura < 90%")
          PY

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Upload reports (tests + jacoco)
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/tests/test/**
            **/build/reports/jacoco/test/**
  
  docker_build:
    runs-on: ubuntu-latest
    needs: build_test_coverage
    steps:
      - uses: actions/checkout@v4

      # Baja el jar que generaste en el job anterior
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Verify downloaded jar
        run: |
          set -euo pipefail
          ls -lah build/libs
          test -n "$(ls -1 build/libs/*.jar 2>/dev/null | head -n 1)" || (echo "❌ No llegó el jar" && exit 1)

      - name: Build Docker image
        run: |
          set -euo pipefail
          # Lee version desde gradle SIN compilar (si tu printVersion no compila)
          VERSION=$(./gradlew -q printVersion | tr -d '\r' | tail -n 1)
          IMAGE_NAME=ms-factura

          docker build -t $IMAGE_NAME:$VERSION .
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest

      - name: Show images
        run: docker images | head -n 50